version: '3.8'

services:
  # PostgreSQL Database (Supabase backend)
  postgres:
    image: postgres:16-alpine
    container_name: flashcard-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flashcard-network

  # Redis (optional - for caching/sessions if needed in future)
  # redis:
  #   image: redis:7-alpine
  #   container_name: flashcard-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - flashcard-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
        NEXT_PUBLIC_SUPABASE_ANON_KEY: Key not needed for build, only runtime
    container_name: flashcard-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: Key not needed for build, only runtime
      SUPABASE_URL: http://postgres:5432
      SUPABASE_SERVICE_ROLE_KEY: Key not needed for development, only runtime
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flashcard-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  flashcard-network:
    driver: bridge
